<body style="background:#0f0e0d;">

<div class="admin-login">
  <div class="admin-login__box">
    <div class="admin-login__logo">
      <img src="../assets/template/logo-kahveyani.svg" alt="Kahve Yanı" style="height:32px;width:auto;">
    </div>
    <h2>Admin Girişi</h2>

    <div id="login-error" style="display:none;color:#ff6b6b;font-family:'Sneak',sans-serif;font-size:0.85em;text-align:center;margin-bottom:16px;"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="admin@kahveyani.store" required autofocus>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="login-btn"
        style="width:100%;padding:14px;margin-top:8px;">
        Giriş Yap
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="admin.js"></script>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errDiv = document.getElementById('login-error');
  errDiv.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Giriş yapılıyor...';

  const { error } = await AdminAuth.signIn(
    document.getElementById('email').value.trim(),
    document.getElementById('password').value,
  );

  if (error) {
    errDiv.textContent = 'E-posta veya şifre hatalı.';
    errDiv.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Giriş Yap';
  } else {
    window.location.href = '/admin/index.html';
  }
}

// Zaten giriş yapılmışsa yönlendir
document.addEventListener('DOMContentLoaded', async () => {
  const session = await AdminAuth.getSession();
  if (session) window.location.href = '/admin/index.html';
});
</script>
</body>
</html>
